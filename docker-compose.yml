services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fashionbag-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/app/db/fashionbag.db
    volumes:
      - ./backend/db:/app/db
      - ./backend/uploads:/app/uploads
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fashionbag-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
